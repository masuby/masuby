<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INFORM Tanzania - Index for Risk Management</title>
    <!-- Single Page Apps for GitHub Pages redirect script -->
    <script type="text/javascript">
      // This script checks if a redirect is present in the query string,
      // converts it back into the correct URL and adds it to the browser's history.
      // Custom domain: inform.co.tz (root path)
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              '/' + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
