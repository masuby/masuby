<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Committees - INFORM Risk Management System</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <h1>INFORM Risk Management</h1>
        </div>
        <div class="nav-links">
            <a href="/app/dashboard">Dashboard</a>
            <a href="/app/data-entry">Data Entry</a>
            <a href="/app/risk-scores">Risk Scores</a>
            <a href="/transparency">Transparency</a>
            <button id="logout-btn" class="btn btn-outline">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="filter-section">
                <h3>Filter Committees</h3>

                <div class="form-group">
                    <label>Committee Type</label>
                    <select id="filter-type">
                        <option value="">All Types</option>
                        <option value="regional">Regional</option>
                        <option value="ward">Ward</option>
                    </select>
                </div>

                <button id="apply-filter" class="btn btn-primary btn-block">Apply Filter</button>
            </div>

            <div class="sidebar-stats" style="margin-top: 2rem;">
                <h3>Statistics</h3>
                <div class="stat-item">
                    <span class="stat-label">Total Committees</span>
                    <span class="stat-value" id="total-committees">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Regional</span>
                    <span class="stat-value" id="regional-count">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Ward</span>
                    <span class="stat-value" id="ward-count">-</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1>Disaster Committees</h1>
                <p>Regional and Ward Disaster Management Committees</p>
            </header>

            <section class="committees-section">
                <div class="section-header">
                    <h2>Registered Committees</h2>
                    <button id="add-committee-btn" class="btn btn-primary" style="display: none;">
                        + Add Committee
                    </button>
                </div>

                <div class="committees-grid" id="committees-grid">
                    <div class="loading">Loading committees...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Committee Modal -->
    <div id="add-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Committee</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>

            <form id="committee-form">
                <div class="form-group">
                    <label for="comm-name">Committee Name *</label>
                    <input type="text" id="comm-name" required placeholder="e.g., Dodoma Regional Disaster Committee">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="comm-type">Type *</label>
                        <select id="comm-type" required>
                            <option value="regional">Regional</option>
                            <option value="ward">Ward</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="comm-adm1">Region (ADM1) *</label>
                        <select id="comm-adm1" required>
                            <option value="">Select Region</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" id="adm2-group" style="display: none;">
                    <label for="comm-adm2">Ward/District (ADM2)</label>
                    <input type="text" id="comm-adm2" placeholder="Ward or district name">
                </div>

                <div class="form-group">
                    <label for="comm-contact">Contact Person</label>
                    <input type="text" id="comm-contact" placeholder="Full name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="comm-phone">Phone</label>
                        <input type="tel" id="comm-phone" placeholder="+255 XXX XXX XXX">
                    </div>

                    <div class="form-group">
                        <label for="comm-email">Email</label>
                        <input type="email" id="comm-email" placeholder="email@example.com">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Committee</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        const regions = [
            {code: 'TZ01', name: 'Dodoma'},
            {code: 'TZ02', name: 'Arusha'},
            {code: 'TZ03', name: 'Kilimanjaro'},
            {code: 'TZ04', name: 'Tanga'},
            {code: 'TZ05', name: 'Morogoro'},
            {code: 'TZ06', name: 'Pwani'},
            {code: 'TZ07', name: 'Dar es Salaam'},
            {code: 'TZ08', name: 'Lindi'},
            {code: 'TZ09', name: 'Mtwara'},
            {code: 'TZ10', name: 'Ruvuma'},
            {code: 'TZ11', name: 'Iringa'},
            {code: 'TZ12', name: 'Mbeya'},
            {code: 'TZ13', name: 'Singida'},
            {code: 'TZ14', name: 'Tabora'},
            {code: 'TZ15', name: 'Rukwa'},
            {code: 'TZ16', name: 'Kigoma'},
            {code: 'TZ17', name: 'Shinyanga'},
            {code: 'TZ18', name: 'Kagera'},
            {code: 'TZ19', name: 'Mwanza'},
            {code: 'TZ20', name: 'Mara'},
            {code: 'TZ21', name: 'Manyara'},
            {code: 'TZ22', name: 'Njombe'},
            {code: 'TZ23', name: 'Katavi'},
            {code: 'TZ24', name: 'Simiyu'},
            {code: 'TZ25', name: 'Geita'},
            {code: 'TZ26', name: 'Songwe'}
        ];

        let userRole = '';

        document.addEventListener('DOMContentLoaded', () => {
            loadUserRole();
            loadCommittees();
            populateRegions();
        });

        async function loadUserRole() {
            try {
                const response = await fetch('/api/v1/users/me', {
                    headers: { 'Authorization': 'Bearer ' + getCookie('auth_token') }
                });
                const data = await response.json();
                if (data.success) {
                    userRole = data.data.role;
                    if (userRole === 'admin') {
                        document.getElementById('add-committee-btn').style.display = 'block';
                    }
                }
            } catch (err) {
                console.error('Failed to load user role:', err);
            }
        }

        function populateRegions() {
            const select = document.getElementById('comm-adm1');
            regions.forEach(r => {
                const option = document.createElement('option');
                option.value = r.code;
                option.textContent = r.name;
                option.dataset.name = r.name;
                select.appendChild(option);
            });
        }

        async function loadCommittees() {
            try {
                const type = document.getElementById('filter-type').value;
                let url = '/api/v1/committees';
                if (type) url += `?type=${type}`;

                const response = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + getCookie('auth_token') }
                });
                const data = await response.json();

                const grid = document.getElementById('committees-grid');
                if (data.success && data.data && data.data.length > 0) {
                    const committees = data.data;

                    // Update stats
                    document.getElementById('total-committees').textContent = committees.length;
                    document.getElementById('regional-count').textContent =
                        committees.filter(c => c.type === 'regional').length;
                    document.getElementById('ward-count').textContent =
                        committees.filter(c => c.type === 'ward').length;

                    // Render cards
                    grid.innerHTML = committees.map(comm => `
                        <div class="committee-card">
                            <div class="committee-header">
                                <span class="committee-type ${comm.type}">${comm.type}</span>
                                <span class="committee-status ${comm.is_active ? 'active' : 'inactive'}">
                                    ${comm.is_active ? 'Active' : 'Inactive'}
                                </span>
                            </div>
                            <h3>${comm.name}</h3>
                            <div class="committee-location">
                                <strong>Region:</strong> ${comm.adm1_name}
                                ${comm.adm2_name ? `<br><strong>Ward:</strong> ${comm.adm2_name}` : ''}
                            </div>
                            <div class="committee-contact">
                                ${comm.contact_person ? `<p><strong>Contact:</strong> ${comm.contact_person}</p>` : ''}
                                ${comm.contact_phone ? `<p><strong>Phone:</strong> ${comm.contact_phone}</p>` : ''}
                                ${comm.contact_email ? `<p><strong>Email:</strong> ${comm.contact_email}</p>` : ''}
                            </div>
                            <div class="committee-meta">
                                <small>Registered: ${new Date(comm.created_at).toLocaleDateString()}</small>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<p class="empty-state">No committees found</p>';
                    document.getElementById('total-committees').textContent = '0';
                    document.getElementById('regional-count').textContent = '0';
                    document.getElementById('ward-count').textContent = '0';
                }
            } catch (err) {
                console.error('Failed to load committees:', err);
            }
        }

        document.getElementById('apply-filter').addEventListener('click', loadCommittees);

        document.getElementById('add-committee-btn').addEventListener('click', () => {
            document.getElementById('add-modal').style.display = 'flex';
        });

        function closeModal() {
            document.getElementById('add-modal').style.display = 'none';
            document.getElementById('committee-form').reset();
        }

        document.getElementById('comm-type').addEventListener('change', (e) => {
            document.getElementById('adm2-group').style.display =
                e.target.value === 'ward' ? 'block' : 'none';
        });

        document.getElementById('committee-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const adm1Select = document.getElementById('comm-adm1');
            const selectedOption = adm1Select.selectedOptions[0];

            const payload = {
                name: document.getElementById('comm-name').value,
                type: document.getElementById('comm-type').value,
                adm1_code: adm1Select.value,
                adm1_name: selectedOption.dataset.name,
                adm2_name: document.getElementById('comm-adm2').value || null,
                contact_person: document.getElementById('comm-contact').value,
                contact_phone: document.getElementById('comm-phone').value,
                contact_email: document.getElementById('comm-email').value
            };

            try {
                const response = await fetch('/api/v1/committees', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getCookie('auth_token')
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (data.success) {
                    closeModal();
                    loadCommittees();
                } else {
                    alert(data.error || 'Failed to create committee');
                }
            } catch (err) {
                alert('Network error. Please try again.');
            }
        });

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/api/v1/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        });
    </script>
</body>
</html>
